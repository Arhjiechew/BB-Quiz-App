        // 核心上传逻辑
        function uploadData(collectionName, dataArray) {
            if (dataArray.length === 0) {
                document.getElementById("status").innerText = `⚠️ ${collectionName} 数组是空的，请先在代码里粘贴题目！`;
                return;
            }

            document.getElementById("status").innerText = `⏳ 正在上传 ${dataArray.length} 道题到 ${collectionName}...`;
            document.getElementById("status").style.color = "#f39c12";

            let uploadPromises = [];

            dataArray.forEach(question => {
                // 使用 add() 自动生成唯一的 Document ID 并上传数据
                let promise = db.collection(collectionName).add(question);
                uploadPromises.push(promise);
            });

            // 等待所有题目上传完毕
            Promise.all(uploadPromises).then(() => {
                document.getElementById("status").innerText = `✅ 成功！${dataArray.length} 道题已全部存入 ${collectionName} 数据库！`;
                document.getElementById("status").style.color = "#2ecc71";
            }).catch(error => {
                console.error("上传出错: ", error);
                document.getElementById("status").innerText = `❌ 上传失败，请检查控制台 (F12) 的错误信息。`;
                document.getElementById("status").style.color = "#e74c3c";
            });
        }
    </script>
