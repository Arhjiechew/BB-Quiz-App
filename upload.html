            {"id": "SQ100", "topic": "BB Malaysia & Asia (马来西亚与亚洲男少年军)", "question": "The Boys' Brigade operates across different divisions. Which age group does the 'Pre-Junior Section' generally cater to? (男少年军在不同的组别中运作。「幼级组 / Pre-Junior Section」通常针对哪个年龄段？)", "options": ["6 to 8 years old (6至8岁)", "9 to 12 years old (9至12岁)", "13 to 19 years old (13至19岁)", "Adults only (仅限成人)"], "correct_index": 0}
        ];

        // ==========================================
        // 真正的上传执行函数
        // ==========================================
        window.uploadData = function(collectionName, dataArray) {
            if (dataArray.length === 0 || !dataArray[0].id) {
                document.getElementById("status").innerText = `⚠️ 数组是空的，或者题目里没有 "id" 字段！`;
                return;
            }

            document.getElementById("status").innerText = `⏳ 正在准备上传 ${dataArray.length} 道双语题目到 ${collectionName}...`;
            document.getElementById("status").style.color = "#f39c12";

            let uploadPromises = [];

            dataArray.forEach((question) => {
                let docId = question.id; 
                let promise = db.collection(collectionName).doc(docId).set(question);
                uploadPromises.push(promise);
            });

            // 等待所有题目上传完毕
            Promise.all(uploadPromises).then(() => {
                document.getElementById("status").innerText = `✅ 成功！${dataArray.length} 道中英双语题目\n已全部覆盖存入 ${collectionName}！`;
                document.getElementById("status").style.color = "#2ecc71";
            }).catch(error => {
                console.error("上传出错: ", error);
                document.getElementById("status").innerText = `❌ 上传失败，请按 F12 检查控制台报错。`;
                document.getElementById("status").style.color = "#e74c3c";
            });
        };
    </script>
</body>
