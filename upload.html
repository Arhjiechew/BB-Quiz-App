            {"id":"BQ016","topic":"出埃及记21章","question":"如果奴仆说‘我爱我的主人，不愿意自由出去’，主人要用锥子穿透他的哪里？ (If a servant says 'I love my master and do not want to go free', where must the master pierce with an awl?)","options":["耳朵 (Ear)","手掌 (Palm)","脚板 (Foot)","嘴唇 (Lip)"],"correct_index":0},
            {"id":"BQ017","topic":"出埃及记21章","question":"根据律法，咒骂父亲或母亲的，必须受到什么惩罚？ (According to the law, what is the punishment for cursing one's father or mother?)","options":["被打三十下 (Beaten 30 times)","赶出营外 (Cast out of the camp)","必被处死 (Must be put to death)","终身为奴 (Enslaved for life)"],"correct_index":2},
            {"id":"BQ018","topic":"出埃及记21章","question":"如果主人的牛把人触死，这头牛必须怎么处理？ (If a man's bull gores someone to death, what must be done to the bull?)","options":["卖掉 (Sold)","用石头打死 (Stoned to death)","送给祭司 (Given to the priest)","放生 (Set free)"],"correct_index":1},
            {"id":"BQ019","topic":"出埃及记22章","question":"如果有人偷了牛并宰杀或卖了，他必须用几头牛赔偿一头牛？ (If someone steals a bull and slaughters/sells it, how many bulls must he repay for one bull?)","options":["两头 (2)","三头 (3)","四头 (4)","五头 (5)"],"correct_index":3},
            {"id":"BQ020","topic":"出埃及记22章","question":"神警告不可欺压孤儿寡妇，否则神会用什么杀死欺压者？ (God warned against oppressing widows and orphans, or else He will kill the oppressor with what?)","options":["饥荒 (Famine)","瘟疫 (Plague)","刀剑 (The sword)","大水 (Flood)"],"correct_index":2},
            {"id":"BQ021","topic":"出埃及记22章","question":"如果借钱给穷苦的以色列人，不可向他收取什么？ (If you lend money to a poor Israelite, what must you not charge him?)","options":["衣服 (Clothes)","利息 (Interest)","食物 (Food)","牛羊 (Livestock)"],"correct_index":1},
            {"id":"BQ022","topic":"出埃及记23章","question":"如果遇见仇敌的牛或驴走迷了路，你必须怎么做？ (If you come across your enemy's ox or donkey wandering off, what must you do?)","options":["把它杀掉 (Kill it)","当没看见 (Ignore it)","把它牵回来交给他 (Take it back to him)","把它藏起来 (Hide it)"],"correct_index":2},
            {"id":"BQ023","topic":"出埃及记23章","question":"到了第七年，以色列人的土地要怎样处理？ (During the seventh year, what must be done with the land?)","options":["种更多的小麦 (Plant more wheat)","必须卖掉 (Must be sold)","要休息不种，让穷人吃 (Let it rest unplowed, so the poor may eat)","建房子 (Build houses on it)"],"correct_index":2},
            {"id":"BQ024","topic":"出埃及记23章","question":"神命令第七天要休息（安息日），是为了让谁可以歇息？ (God commanded rest on the seventh day so that who could refresh themselves?)","options":["只有主人 (Only the master)","只有祭司 (Only the priests)","牛、驴和所有仆人都可以歇息 (The ox, donkey, and all servants)","只有外人 (Only foreigners)"],"correct_index":2},
            {"id":"BQ025","topic":"出埃及记23章","question":"神答应差遣谁在以色列人前面领路，保护他们？ (Who did God promise to send ahead of the Israelites to guard them along the way?)","options":["摩西 (Moses)","约书亚 (Joshua)","使者/天使 (An angel)","亚伦 (Aaron)"],"correct_index":2},
            {"id":"BQ026","topic":"出埃及记24章","question":"摩西带着谁一起上山，而把长老们留在山下？ (Who did Moses take with him up the mountain, leaving the elders behind?)","options":["亚伦 (Aaron)","户珥 (Hur)","约书亚 (Joshua)","迦勒 (Caleb)"],"correct_index":2},
            {"id":"BQ027","topic":"出埃及记24章","question":"摩西在西奈山上进入云中，在山上待了多久？ (How long was Moses on Mount Sinai inside the cloud?)","options":["三天三夜 (3 days and nights)","七天七夜 (7 days and nights)","十二天 (12 days)","四十昼夜 (40 days and nights)"],"correct_index":3},
            {"id":"BQ028","topic":"出埃及记25章","question":"神要以色列人甘心乐意送礼物来，是为了建造什么？ (God asked the Israelites to bring willing offerings to build what?)","options":["金字塔 (Pyramid)","圣所/帐幕 (Sanctuary/Tabernacle)","大船 (Big boat)","宫殿 (Palace)"],"correct_index":1},
            {"id":"BQ029","topic":"出埃及记25章","question":"神吩咐要把什么东西放在约柜里面？ (What did God instruct to be placed inside the Ark of the Covenant?)","options":["一罐水 (A jar of water)","法版/律法版 (The Tablets of the Testimony)","摩西的鞋子 (Moses' sandals)","一把剑 (A sword)"],"correct_index":1},
            {"id":"BQ030","topic":"出埃及记25章","question":"施恩座的两头有几个用金子锤出来的基路伯（天使）？ (How many hammered gold cherubim were on the ends of the Mercy Seat?)","options":["两个 (Two)","四个 (Four)","六个 (Six)","十二个 (Twelve)"],"correct_index":0},
            {"id":"BQ031","topic":"出埃及记25章","question":"在圣所的桌子上，要经常摆放什么？ (What must be continuously placed on the table in the Sanctuary?)","options":["水果 (Fruit)","陈设饼 (Bread of the Presence)","烤肉 (Roast meat)","蜂蜜 (Honey)"],"correct_index":1},
            {"id":"BQ032","topic":"出埃及记25章","question":"会幕里的金灯台是用什么材料做成的？ (What material was the lampstand in the Tabernacle made of?)","options":["纯银 (Pure silver)","木头包金 (Wood overlaid with gold)","纯金 (Pure gold)","黄铜 (Bronze)"],"correct_index":2},
            {"id":"BQ033","topic":"出埃及记26章","question":"帐幕最里面的幔子上，绣着什么图案？ (What design was embroidered on the innermost curtains of the Tabernacle?)","options":["花朵 (Flowers)","基路伯/天使 (Cherubim)","狮子 (Lions)","云彩 (Clouds)"],"correct_index":1},
            {"id":"BQ034","topic":"出埃及记26章","question":"圣所和至圣所中间，是用什么隔开的？ (What separated the Holy Place from the Most Holy Place?)","options":["一堵砖墙 (A brick wall)","一扇木门 (A wooden door)","一层幔子 (A curtain/veil)","一条河 (A river)"],"correct_index":2},
            {"id":"BQ035","topic":"出埃及记27章","question":"祭坛是用皂荚木做的，外面要包上什么金属？ (The altar was made of acacia wood and overlaid with what metal?)","options":["金 (Gold)","银 (Silver)","铜 (Bronze)","铁 (Iron)"],"correct_index":2},
            {"id":"BQ036","topic":"出埃及记27章","question":"点灯的时候，必须使用什么油使灯常常点着？ (What kind of oil must be used to keep the lamps burning continuously?)","options":["猪油 (Lard)","清细的纯橄榄油 (Clear, pure olive oil)","椰子油 (Coconut oil)","香油 (Sesame oil)"],"correct_index":1},
            {"id":"BQ037","topic":"出埃及记28章","question":"神指定谁和他的儿子们穿上圣衣，担任祭司？ (Who did God appoint with his sons to wear sacred garments and serve as priests?)","options":["摩西 (Moses)","亚伦 (Aaron)","约书亚 (Joshua)","迦勒 (Caleb)"],"correct_index":1},
            {"id":"BQ038","topic":"出埃及记28章","question":"大祭司的决断胸牌上，镶嵌了多少块宝石？ (How many precious stones were mounted on the High Priest's breastpiece of decision?)","options":["三块 (3)","七块 (7)","十块 (10)","十二块 (12)"],"correct_index":3},
            {"id":"BQ039","topic":"出埃及记28章","question":"这十二块宝石代表了什么？ (What did these twelve stones represent?)","options":["以色列十二个支派的名字 (Names of the 12 tribes of Israel)","十二个月份 (12 months)","十二个天使 (12 angels)","十二位先知 (12 prophets)"],"correct_index":0},
            {"id":"BQ040","topic":"出埃及记28章","question":"大祭司的头巾正面，有一面纯金的牌子，上面刻着什么字？ (What was engraved on the pure gold plate on the front of the High Priest's turban?)","options":["神爱世人 (God loves the world)","归耶和华为圣 (Holy to the LORD)","阿们 (Amen)","以色列之光 (Light of Israel)"],"correct_index":1},
            {"id":"BQ041","topic":"出埃及记29章","question":"亚伦和儿子们承接圣职时，首先要在会幕门口做什么？ (When Aaron and his sons were ordained, what was the first thing they had to do at the tent entrance?)","options":["用水洗身 (Wash with water)","大声唱歌 (Sing loudly)","吃无酵饼 (Eat unleavened bread)","睡觉 (Sleep)"],"correct_index":0},
            {"id":"BQ042","topic":"出埃及记29章","question":"每天早晨和黄昏，祭司必须在祭坛上各献一只什么动物？ (Every morning and twilight, what animal must the priests sacrifice on the altar?)","options":["一岁的羊羔 (A year-old lamb)","鸽子 (Dove)","牛犊 (Calf)","骆驼 (Camel)"],"correct_index":0},
            {"id":"BQ043","topic":"出埃及记30章","question":"用来烧香的“香坛”，是用什么金属包裹的？ (What metal was the Altar of Incense overlaid with?)","options":["纯银 (Pure silver)","纯铁 (Pure iron)","纯金 (Pure gold)","黄铜 (Bronze)"],"correct_index":2},
            {"id":"BQ044","topic":"出埃及记30章","question":"凡二十岁以上的以色列人，要交多少赎罪银给耶和华？ (How much atonement money must every Israelite 20 years or older pay to the LORD?)","options":["半块舍客勒 (Half a shekel)","十块舍客勒 (Ten shekels)","一两金子 (An ounce of gold)","五块银子 (Five silver coins)"],"correct_index":0},
            {"id":"BQ045","topic":"出埃及记30章","question":"祭司在进会幕之前，必须在“铜盆”里洗什么，免得死亡？ (Before entering the tent, what must priests wash in the bronze basin so they will not die?)","options":["洗头 (Wash their hair)","洗衣服 (Wash their clothes)","洗手洗脚 (Wash their hands and feet)","洗脸 (Wash their face)"],"correct_index":2},
            {"id":"BQ046","topic":"出埃及记30章","question":"神警告，神圣的“圣膏油”不可以倒在谁的身上？ (God warned that the sacred anointing oil must not be poured on whose body?)","options":["祭司的身上 (A priest's body)","普通人的身上 (An ordinary person's body)","会幕的器具上 (Tabernacle furnishings)","约柜上 (The Ark)"],"correct_index":1},
            {"id":"BQ047","topic":"出埃及记31章","question":"神特别赐下圣灵和智慧给谁，让他能做各样的精工？ (Who did God specially fill with the Spirit and wisdom for all kinds of craftsmanship?)","options":["亚伦 (Aaron)","约书亚 (Joshua)","比撒列 (Bezalel)","摩西 (Moses)"],"correct_index":2},

            {"id":"BQ049","topic":"出埃及记31章","question":"摩西下山时拿着的两块法版，上面的字是谁写的？ (Who wrote the words on the two tablets of the Testimony that Moses brought down?)","options":["摩西自己写的 (Moses himself)","亚伦写的 (Aaron)","神用指头写的 (Inscribed by the finger of God)","天使写的 (Angels)"],"correct_index":2},
            {"id":"BQ050","topic":"出埃及记32章","question":"百姓看摩西迟迟不下山，就要求亚伦造了什么神像？ (What idol did the people demand Aaron to make when Moses delayed coming down?)","options":["金苹果 (Golden apple)","金牛犊 (Golden calf)","银狮子 (Silver lion)","铜蛇 (Bronze serpent)"],"correct_index":1},
            {"id":"BQ051","topic":"出埃及记32章","question":"百姓是用什么东西造出金牛犊的？ (What items did the people use to make the golden calf?)","options":["金币 (Gold coins)","金杯 (Gold cups)","金耳环 (Gold earrings)","金项链 (Gold necklaces)"],"correct_index":2},

            {"id":"BQ054","topic":"出埃及记33章","question":"神对摩西说祂不和百姓同去，因为百姓是怎样的人？ (Why did God tell Moses He would not go with the people?)","options":["很懒惰的 (They are lazy)","很聪明的 (They are smart)","硬着颈项的/固执的 (They are a stiff-necked people)","胆小的 (They are cowards)"],"correct_index":2},
            {"id":"BQ055","topic":"出埃及记33章","question":"摩西把常常用来求问神的“会幕”搭在哪里？ (Where did Moses pitch the 'Tent of Meeting' used to inquire of the LORD?)","options":["营地的正中间 (In the middle of the camp)","营外，离营有一段距离 (Outside the camp, some distance away)","山顶上 (On top of the mountain)","河边 (By the river)"],"correct_index":1},
            {"id":"BQ056","topic":"出埃及记33章","question":"当摩西进入会幕时，谁一直留在会幕里不离开？ (Who stayed inside the tent and did not leave when Moses entered?)","options":["亚伦 (Aaron)","户珥 (Hur)","嫩的儿子约书亚 (Joshua son of Nun)","迦勒 (Caleb)"],"correct_index":2},
            {"id":"BQ057","topic":"出埃及记34章","question":"摩西重新凿了两块石版上山，神在上面写了什么？ (What did God write on the two new stone tablets Moses chiseled?)","options":["十诫/立约的话 (The Ten Commandments / Words of the covenant)","会幕的尺寸 (Tabernacle dimensions)","新歌 (A new song)","节期的日历 (Festival calendar)"],"correct_index":0},
            {"id":"BQ058","topic":"出埃及记34章","question":"耶和华在云中宣告自己是怎样的神？ (How did the LORD proclaim Himself in the cloud?)","options":["严厉又可怕的神 (A strict and scary God)","喜欢战争的神 (A God who loves war)","有怜悯、有恩典的神 (A compassionate and gracious God)","只爱穷人的神 (A God who only loves the poor)"],"correct_index":2},
            {"id":"BQ059","topic":"出埃及记34章","question":"摩西这一次在西奈山上呆了多久？ (How long did Moses stay on Mount Sinai this time?)","options":["三天三夜 (3 days and nights)","十天 (10 days)","二十昼夜 (20 days and nights)","四十昼夜 (40 days and nights)"],"correct_index":3},
            {"id":"BQ060","topic":"出埃及记34章","question":"摩西下山时，他的脸有什么特别的变化？ (What was special about Moses' face when he came down the mountain?)","options":["面皮发黑 (His face turned black)","长满胡须 (He grew a full beard)","面皮发光 (His face was radiant/shining)","满是泥土 (Covered in mud)"],"correct_index":2},
            {"id":"BQ061","topic":"出埃及记34章","question":"因为摩西的脸发光，他在对百姓说话之后，用什么蒙住脸？ (Because his face was radiant, what did Moses put over his face after speaking to the people?)","options":["一本书 (A book)","帕子/面纱 (A veil)","双手 (His hands)","树叶 (Leaves)"],"correct_index":1},
            {"id":"BQ062","topic":"出埃及记35章","question":"摩西召集大家，吩咐在安息日绝对不可以做什么事？ (Moses assembled the people and commanded them absolutely NOT to do what on the Sabbath?)","options":["喝水 (Drink water)","在任何住处生火 (Light a fire in any of their dwellings)","睡觉 (Sleep)","讲话 (Speak)"],"correct_index":1},
            {"id":"BQ063","topic":"出埃及记35章","question":"建造会幕的贵重材料（金银铜等）是谁拿来的？ (Who brought the precious materials like gold, silver, bronze to build the Tabernacle?)","options":["从埃及买来的 (Bought from Egypt)","神从天上变出来的 (God magically dropped them from heaven)","凡心里受感、甘心乐意的百姓 (Everyone whose heart stirred them and who was willing)","商人送的 (Given by merchants)"],"correct_index":2},
            {"id":"BQ064","topic":"出埃及记35章","question":"那些有智慧的妇女们，为了建造会幕做了什么贡献？ (What contribution did the skilled women make for the building of the Tabernacle?)","options":["打猎 (Hunting)","亲手纺线 (Spun yarn with their hands)","砍树 (Cutting down trees)","打铁 (Forging iron)"],"correct_index":1},
            {"id":"BQ065","topic":"出埃及记35章","question":"谁被神的灵充满，有聪明显出各样奇巧的手工来建造会幕？ (Who was filled with the Spirit of God, with skill and ability for all kinds of crafts to build the Tabernacle?)","options":["摩西 (Moses)","亚伦 (Aaron)","比撒列和亚何利亚伯 (Bezalel and Oholiab)","约书亚 (Joshua)"],"correct_index":2},
            {"id":"BQ066","topic":"出埃及记21章","question":"在惩罚条例中，如果有人打人以致打死，他必须受到什么惩罚？ (In the laws concerning violence, what is the punishment for striking a person and causing their death?)","options":["赔偿银子 (Pay a silver fine)","必须被处死 (Must be put to death)","终身为奴 (Enslaved for life)","流放 (Exiled)"],"correct_index":1},
            {"id":"BQ067","topic":"出埃及记21章","question":"如果主人的奴仆有了妻子，在奴仆第七年得自由时，妻子和孩子归谁？ (If a master's servant is married, who do the wife and children belong to when he goes free in the 7th year?)","options":["跟着奴仆一起走 (They go with the servant)","归主人所有 (They belong to the master)","由祭司决定 (Decided by the priest)","妻子自由，孩子归主人 (Wife is free, children belong to master)"],"correct_index":1},
            {"id":"BQ068","topic":"出埃及记21章","question":"圣经中著名的“以眼还眼，以牙还牙”是针对哪种情况的赔偿原则？ (The famous 'eye for eye, tooth for tooth' is a compensation principle for what situation?)","options":["偷窃财产 (Stealing property)","借钱不还 (Not paying debt)","若有伤害/彼此争斗导致严重伤害 (If there is serious injury from a fight)","欺骗邻舍 (Deceiving a neighbor)"],"correct_index":2},
            {"id":"BQ069","topic":"出埃及记22章","question":"如果借给邻舍的牲畜被野兽撕裂，借牲畜的人需要赔偿吗？ (If an animal lent to a neighbor is torn to pieces by a wild beast, does the borrower need to pay restitution?)","options":["必须全额赔偿 (Must fully compensate)","赔偿一半 (Pay half)","带被撕裂的尸体作证，就不必赔偿 (Bring the remains as evidence, no restitution needed)","由祭司决定 (Decided by priest)"],"correct_index":2},
            {"id":"BQ070","topic":"出埃及记22章","question":"若贼挖透房屋被击打致死，在什么情况下打死他的人“有流人血的罪”？ (If a thief is caught breaking in and is struck and dies, under what condition is the defender guilty of bloodshed?)","options":["太阳出来之前 (Before sunrise)","太阳出来之后 (After sunrise)","月亮升起时 (When the moon rises)","在安息日 (On the Sabbath)"],"correct_index":1},
            {"id":"BQ071","topic":"出埃及记22章","question":"如果你拿邻舍的衣服作当头（抵押品），最迟必须在什么时候归还给他？ (If you take your neighbor's cloak as a pledge, by what time must you return it at the latest?)","options":["第二天早晨 (Next morning)","日落的时候 (By sunset)","七天以后 (After 7 days)","安息日的时候 (On the Sabbath)"],"correct_index":1},

        // ==========================================
        // 真正的上传执行函数
        // ==========================================
        window.uploadData = function(collectionName, dataArray) {
            if (dataArray.length === 0 || !dataArray[0].id) {
                document.getElementById("status").innerText = `⚠️ 数组是空的，或者题目里没有 "id" 字段！`;
                return;
            }

            document.getElementById("status").innerText = `⏳ 正在准备上传 ${dataArray.length} 道双语题目到 ${collectionName}...`;
            document.getElementById("status").style.color = "#f39c12";

            let uploadPromises = [];

            dataArray.forEach((question) => {
                let docId = question.id; 
                let promise = db.collection(collectionName).doc(docId).set(question);
                uploadPromises.push(promise);
            });

            // 等待所有题目上传完毕
            Promise.all(uploadPromises).then(() => {
                document.getElementById("status").innerText = `✅ 成功！${dataArray.length} 道中英双语题目\n已全部覆盖存入 ${collectionName}！`;
                document.getElementById("status").style.color = "#2ecc71";
            }).catch(error => {
                console.error("上传出错: ", error);
                document.getElementById("status").innerText = `❌ 上传失败，请按 F12 检查控制台报错。`;
                document.getElementById("status").style.color = "#e74c3c";
            });
        };
    </script>
