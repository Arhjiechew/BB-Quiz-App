<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BB Quiz Challenge ⚓</title>
    <style>
        /* 高级 App 风格 CSS */
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f0f4f8; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 450px; min-height: 600px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; display: flex; flex-direction: column; box-sizing: border-box; }
        .hidden { display: none !important; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 14px; }
        .role-btn { width: 100%; padding: 25px; margin: 15px 0; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .btn-junior { background: linear-gradient(135deg, #3498db, #2980b9); box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); }
        .btn-senior { background: linear-gradient(135deg, #e74c3c, #c0392b); box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }
        .role-btn:active, .btn-primary:active { transform: scale(0.96); }
        input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #bdc3c7; border-radius: 10px; margin-bottom: 20px; text-align: center; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #3498db; }
        .btn-primary { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
        .top-bar { display: flex; justify-content: space-between; background: #f8f9fa; padding: 10px 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-size: 14px; font-weight: bold; color: #34495e; }
        .top-bar span { display: block; font-size: 18px; color: #2c3e50; }
        .progress-text { font-size: 14px; color: #7f8c8d; font-weight: bold; margin-bottom: 10px; }
        .question-text { font-size: 20px; font-weight: bold; line-height: 1.5; margin-bottom: 30px; color: #2c3e50; min-height: 90px; }
        .option-btn { width: 100%; padding: 18px 20px; margin-bottom: 15px; border: 2px solid #e0e6ed; border-radius: 12px; background: white; text-align: left; cursor: pointer; transition: 0.2s; font-size: 16px; font-weight: 500; color: #34495e; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f0f8ff; }
        .option-btn.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; font-weight: bold; }
        .option-btn.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.9; }
        .result-stats { background: #f8f9fa; padding: 20px; border-radius: 15px; margin: 20px 0; }
        .result-stats p { font-size: 18px; margin: 10px 0; color: #34495e; }
        .result-stats strong { color: #2c3e50; font-size: 22px; }
        #nextBtn { margin-top: auto; background: #3498db; }
    </style>
</head>
<body>

    <div id="page1-role" class="container">
        <h1>BB Quiz Challenge ⚓</h1>
        <p class="subtitle">Please select your category (请选择组别)</p>
        <button class="role-btn btn-junior" onclick="selectRole('Junior')">👦 Junior (小学组)</button>
        <button class="role-btn btn-senior" onclick="selectRole('Senior')">👨 Senior (中学组)</button>
    </div>

    <div id="page2-name" class="container hidden">
        <h1>Welcome, <span id="displayRole"></span>!</h1>
        <p class="subtitle">Enter your full name (Must be UPPERCASE)</p>
        <input type="text" id="playerName" placeholder="FULL NAME (e.g. ALI BIN ABU)" required>
        <button class="btn-primary" onclick="startQuiz()">▶️ Start Now</button>
        <br>
        <button style="background:none; border:none; color:#7f8c8d; cursor:pointer; text-decoration:underline; padding:10px; margin-top:10px;" onclick="goBack()">⬅️ Back</button>
    </div>

    <div id="page3-quiz" class="container hidden">
        <div class="top-bar">
            <div>Score <span id="scoreDisplay" style="color:#f39c12;">0</span></div>
            <div>Combo <span id="streakDisplay" style="color:#e74c3c;">0</span></div>
            <div>Correct <span id="correctDisplay" style="color:#2ecc71;">0 / 50</span></div>
        </div>
        
        <div class="progress-text" id="progressText">Question 1 of 50</div>
        <div class="question-text" id="questionText">Loading...</div>
        
        <button class="option-btn" id="btn0" onclick="checkAnswer(0)">A.</button>
        <button class="option-btn" id="btn1" onclick="checkAnswer(1)">B.</button>
        <button class="option-btn" id="btn2" onclick="checkAnswer(2)">C.</button>
        <button class="option-btn" id="btn3" onclick="checkAnswer(3)">D.</button>

        <button class="btn-primary hidden" id="nextBtn" onclick="nextQuestion()">Next Question ➡️</button>
    </div>

    <div id="page4-result" class="container hidden">
        <h1>🎉 Completed!</h1>
        <h2 id="finalName"></h2>
        <div class="result-stats">
            <p>🏆 Total Score: <strong id="finalScore" style="color: #f39c12;">0</strong></p>
            <p>🔥 Max Combo: <strong id="finalCombo" style="color: #e74c3c;">0</strong></p>
            <p>✅ Correct: <strong id="finalCorrect" style="color: #2ecc71;">0</strong> / 50</p>
        </div>
        <button class="btn-primary" onclick="location.reload()">🏠 Play Again</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // ⚠️⚠️⚠️ 在这里填入你的 Firebase 钥匙 ⚠️⚠️⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyDZU8J6tnyCe_-amiBvFuwlwpx4fXw-uGM",
            authDomain: "bb-quiz-app.firebaseapp.com",
            projectId: "bb-quiz-app",
            storageBucket: "bb-quiz-app.firebasestorage.app",
            messagingSenderId: "370671276686",
            appId: "1:370671276686:web:204abb8c375f130b3a2fdf",
            measurementId: "G-R83HJ2EDQG"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 游戏变量
        let currentRole = "", playerName = "", questions = [], currentQIndex = 0;
        let score = 0, currentStreak = 0, maxStreak = 0, totalCorrect = 0;

        function selectRole(role) {
            currentRole = role;
            document.getElementById("displayRole").innerText = role;
            document.getElementById("page1-role").classList.add("hidden");
            document.getElementById("page2-name").classList.remove("hidden");
        }

        function goBack() {
            document.getElementById("page2-name").classList.add("hidden");
            document.getElementById("page1-role").classList.remove("hidden");
        }

        function startQuiz() {
            let nameInput = document.getElementById("playerName").value.trim();
            if (nameInput === "") {
                alert("Please enter your name!");
                return;
            }
            playerName = nameInput.toUpperCase(); // 名字转大写

            document.getElementById("page2-name").classList.add("hidden");
            document.getElementById("page3-quiz").classList.remove("hidden");
            document.getElementById("questionText").innerText = "Loading questions from database...";

            let collectionName = currentRole === "Junior" ? "JuniorQuestions" : "SeniorQuestions";
            
            db.collection(collectionName).get().then((querySnapshot) => {
                questions = [];
                querySnapshot.forEach((doc) => questions.push(doc.data()));
                
                if(questions.length === 0) {
                    document.getElementById("questionText").innerText = "No questions found!";
                    return;
                }

                // 核心：打乱所有题目，并只抽取 50 题
                questions.sort(() => Math.random() - 0.5);
                questions = questions.slice(0, 50); 
                
                loadQuestionUI();
            });
        }

        function loadQuestionUI() {
            let q = questions[currentQIndex];
            document.getElementById("progressText").innerText = `Question ${currentQIndex + 1} of ${questions.length}`;
            document.getElementById("questionText").innerText = q.question;
            
            for(let i=0; i<4; i++) {
                let btn = document.getElementById("btn" + i);
                btn.innerText = q.options[i];
                btn.className = "option-btn"; 
                btn.disabled = false;         
            }
            document.getElementById("nextBtn").classList.add("hidden");
        }

        function checkAnswer(selectedIndex) {
            let q = questions[currentQIndex];
            let correctIndex = q.correct_index;

            for(let i=0; i<4; i++) document.getElementById("btn" + i).disabled = true;

            if (selectedIndex === correctIndex) {
                document.getElementById("btn" + selectedIndex).classList.add("correct");
                currentStreak++;
                totalCorrect++;
                if (currentStreak > maxStreak) maxStreak = currentStreak;
                score += 10 * Math.pow(2, currentStreak - 1);
            } else {
                document.getElementById("btn" + selectedIndex).classList.add("wrong");
                document.getElementById("btn" + correctIndex).classList.add("correct");
                currentStreak = 0; 
            }

            document.getElementById("scoreDisplay").innerText = score;
            document.getElementById("streakDisplay").innerText = currentStreak;
            document.getElementById("correctDisplay").innerText = `${totalCorrect} / ${questions.length}`;
            document.getElementById("nextBtn").classList.remove("hidden");
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < questions.length) {
                loadQuestionUI();
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById("page3-quiz").classList.add("hidden");
            document.getElementById("page4-result").classList.remove("hidden");

            document.getElementById("finalName").innerText = playerName + " (" + currentRole + ")";
            document.getElementById("finalScore").innerText = score;
            document.getElementById("finalCombo").innerText = maxStreak;
            document.getElementById("finalCorrect").innerText = totalCorrect;
            
            // 上传分数到 Leaderboard (名字相同会自动覆盖更新)
            let playerDocId = currentRole + "_" + playerName;
            db.collection("Leaderboard").doc(playerDocId).set({
                name: playerName,
                role: currentRole,
                score: score,
                maxCombo: maxStreak,
                correctAnswers: totalCorrect,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    </script>
</body>
</html>
