<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BB Quiz Challenge ⚓</title>
    </head>
<body>

    <div id="app">
        <div id="page1-role" class="container">
            <h1>BB Quiz Challenge ⚓</h1>
            <p class="subtitle">Please select your category (请选择组别)</p>
            <button id="btnSelectJunior" class="role-btn btn-junior">👦 Junior (小学组)</button>
            <button id="btnSelectSenior" class="role-btn btn-senior">👨 Senior (中学组)</button>
        </div>

        <div id="page2-name" class="container hidden">
            <h1>Welcome, <span id="displayRole"></span>!</h1>
            <p class="subtitle">Enter your full name (Must be UPPERCASE)</p>
            <input type="text" id="playerName" placeholder="FULL NAME (e.g. ALI BIN ABU)" required>
            <button id="btnStartQuiz" class="btn-primary">▶️ Start Now</button>
            <br>
            <button id="btnBackToRole" class="btn-back">⬅️ Back</button>
        </div>

        <div id="page3-quiz" class="container hidden">
            <div class="top-bar">
                <div>Score <span id="scoreDisplay">0</span></div>
                <div>Combo <span id="streakDisplay">0</span></div>
                <div>Correct <span id="correctDisplay">0 / 50</span></div>
            </div>
            
            <div class="progress-text" id="progressText">Question 1 of 50</div>
            <div class="question-text" id="questionText">Loading...</div>
            
            <div id="optionsContainer">
                <button class="option-btn" data-index="0">A.</button>
                <button class="option-btn" data-index="1">B.</button>
                <button class="option-btn" data-index="2">C.</button>
                <button class="option-btn" data-index="3">D.</button>
            </div>

            <button class="btn-primary hidden" id="nextBtn">Next Question ➡️</button>
        </div>

        <div id="page4-result" class="container hidden">
            <h1>🎉 Completed!</h1>
            <h2 id="finalName"></h2>
            <div class="result-stats">
                <p>🏆 Total Score: <strong id="finalScore">0</strong></p>
                <p>🔥 Max Combo: <strong id="finalCombo">0</strong></p>
                <p>✅ Correct: <strong id="finalCorrect">0</strong> / 50</p>
            </div>
            <button id="btnRestart" class="btn-primary">🏠 Play Again</button>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
