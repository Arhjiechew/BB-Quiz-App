<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BB Quiz Challenge ⚓</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 动态毛玻璃背景与卡片特效 */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        /* 炫酷背景光晕 */
        .bg-orb-1 { position: absolute; top: -10%; left: -10%; width: 300px; height: 300px; background: rgba(99, 102, 241, 0.4); border-radius: 50%; filter: blur(80px); animation: float 6s infinite alternate; }
        .bg-orb-2 { position: absolute; bottom: -10%; right: -10%; width: 300px; height: 300px; background: rgba(236, 72, 153, 0.3); border-radius: 50%; filter: blur(80px); animation: float 8s infinite alternate-reverse; }

        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(30px) scale(1.1); } }

        /* 毛玻璃主卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 页面切换动画 */
        .page-enter { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 选项按钮的基础与变色特效 (覆盖 Tailwind) */
        .option-btn { transition: all 0.2s ease-in-out; }
        .option-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #6366f1; background: #e0e7ff; }
        
        .option-btn.correct { background: linear-gradient(135deg, #10b981, #059669) !important; color: white !important; border-color: #047857 !important; transform: scale(1.02); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); font-weight: bold; }
        .option-btn.wrong { background: linear-gradient(135deg, #f43f5e, #e11d48) !important; color: white !important; border-color: #be123c !important; animation: shake 0.4s; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .option-btn:disabled { cursor: not-allowed; }
    </style>
</head>

<body class="relative flex items-center justify-center p-4 overflow-hidden">

    <div class="bg-orb-1 z-0"></div>
    <div class="bg-orb-2 z-0"></div>

    <div id="mainContainer" class="glass-card w-full max-w-[420px] rounded-[2rem] p-6 sm:p-8 relative z-10 flex flex-col min-h-[600px] page-enter">
        
        <div id="page1-role" class="flex flex-col h-full justify-center page-enter">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner border-4 border-white">
                    <i class="fa-solid fa-anchor text-4xl text-indigo-600"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">BB Quiz</h1>
                <p class="text-sm text-slate-500 font-medium mt-2 uppercase tracking-widest">Select Category</p>
            </div>

            <div class="space-y-4 mt-4">
                <button onclick="selectRole('Junior')" class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-bold py-5 rounded-2xl shadow-lg shadow-blue-500/30 transform transition-all active:scale-95 flex items-center justify-center gap-3 text-lg border border-blue-400/50">
                    <i class="fa-solid fa-child-reaching text-2xl"></i> Junior (小学组)
                </button>
                <button onclick="selectRole('Senior')" class="w-full bg-gradient-to-r from-rose-500 to-orange-500 hover:from-rose-600 hover:to-orange-600 text-white font-bold py-5 rounded-2xl shadow-lg shadow-rose-500/30 transform transition-all active:scale-95 flex items-center justify-center gap-3 text-lg border border-rose-400/50">
                    <i class="fa-solid fa-user-graduate text-2xl"></i> Senior (中学组)
                </button>
            </div>
        </div>

        <div id="page2-name" class="hidden flex-col h-full justify-center page-enter">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-indigo-100">
                    <i class="fa-solid fa-id-badge text-2xl text-indigo-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Welcome, <span id="displayRole" class="text-indigo-600"></span>!</h2>
                <p class="text-xs text-slate-400 mt-2 font-bold uppercase tracking-wider">Enter your FULL NAME</p>
            </div>

            <div class="relative mb-6">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-user text-indigo-400"></i>
                </div>
                <input type="text" id="playerName" placeholder="e.g. ALI BIN ABU" 
                       class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none text-slate-800 font-bold uppercase shadow-inner transition-all text-center tracking-wide">
            </div>

            <button onclick="startQuiz()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-500/40 transform transition-all active:scale-95 flex justify-center items-center gap-2 border border-indigo-500/50 text-lg">
                <i class="fa-solid fa-play"></i> Start Challenge
            </button>
            
            <button onclick="goBack()" class="mt-6 text-slate-400 hover:text-slate-600 font-bold text-sm transition-colors flex items-center justify-center gap-1">
                <i class="fa-solid fa-arrow-left"></i> Change Category
            </button>
        </div>

        <div id="page3-quiz" class="hidden flex-col h-full page-enter">
            
            <div class="flex justify-between items-center bg-slate-800 p-3 rounded-2xl mb-6 shadow-inner border border-slate-700 text-white">
                <div class="flex flex-col items-center px-3">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">Score</span>
                    <span id="scoreDisplay" class="font-mono text-lg font-bold text-amber-400">0</span>
                </div>
                <div class="w-px h-8 bg-slate-600"></div>
                <div class="flex flex-col items-center px-3">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">Combo</span>
                    <span class="font-mono text-lg font-bold text-rose-400 flex items-center gap-1"><i class="fa-solid fa-fire text-xs"></i><span id="streakDisplay">0</span></span>
                </div>
                <div class="w-px h-8 bg-slate-600"></div>
                <div class="flex flex-col items-center px-3">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">Correct</span>
                    <span id="correctDisplay" class="font-mono text-lg font-bold text-emerald-400">0/50</span>
                </div>
            </div>
            
            <div class="flex-1 flex flex-col">
                <div id="progressText" class="text-xs font-bold text-indigo-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-bars-progress"></i> Question 1 of 50
                </div>
                <div id="questionText" class="text-xl sm:text-2xl font-extrabold text-slate-800 leading-snug mb-6 flex-1 flex items-center">
                    Loading questions...
                </div>
                
                <div class="space-y-3 mb-6">
                    <button class="option-btn w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-slate-700 font-bold text-left text-[15px] shadow-sm flex items-center gap-3" id="btn0" onclick="checkAnswer(0)">
                        <span class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-500 shrink-0">A</span><span id="opt0"></span>
                    </button>
                    <button class="option-btn w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-slate-700 font-bold text-left text-[15px] shadow-sm flex items-center gap-3" id="btn1" onclick="checkAnswer(1)">
                        <span class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-500 shrink-0">B</span><span id="opt1"></span>
                    </button>
                    <button class="option-btn w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-slate-700 font-bold text-left text-[15px] shadow-sm flex items-center gap-3" id="btn2" onclick="checkAnswer(2)">
                        <span class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-500 shrink-0">C</span><span id="opt2"></span>
                    </button>
                    <button class="option-btn w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-slate-700 font-bold text-left text-[15px] shadow-sm flex items-center gap-3" id="btn3" onclick="checkAnswer(3)">
                        <span class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-500 shrink-0">D</span><span id="opt3"></span>
                    </button>
                </div>
            </div>

            <button id="nextBtn" onclick="nextQuestion()" class="hidden w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-500/40 transform transition-all active:scale-95 flex justify-center items-center gap-2 mt-auto">
                Next Question <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <div id="page4-result" class="hidden flex-col h-full justify-center page-enter">
            <div class="text-center mb-6">
                <i class="fa-solid fa-trophy text-6xl text-amber-400 drop-shadow-lg mb-4 animate-[bounce_2s_infinite]"></i>
                <h1 class="text-3xl font-extrabold text-slate-800">Challenge Complete!</h1>
                <h2 id="finalName" class="text-lg font-bold text-indigo-600 mt-2 bg-indigo-50 inline-block px-4 py-1 rounded-full border border-indigo-100"></h2>
            </div>
            
            <div class="bg-slate-50 rounded-2xl p-6 shadow-inner border border-slate-200 space-y-4 mb-8">
                <div class="flex justify-between items-center pb-4 border-b border-slate-200">
                    <span class="text-slate-500 font-bold flex items-center gap-2"><i class="fa-solid fa-star text-amber-500"></i> Total Score</span>
                    <strong id="finalScore" class="text-2xl font-black text-slate-800 font-mono">0</strong>
                </div>
                <div class="flex justify-between items-center pb-4 border-b border-slate-200">
                    <span class="text-slate-500 font-bold flex items-center gap-2"><i class="fa-solid fa-fire text-rose-500"></i> Max Combo</span>
                    <strong id="finalCombo" class="text-xl font-bold text-slate-800 font-mono">0</strong>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-500 font-bold flex items-center gap-2"><i class="fa-solid fa-check-circle text-emerald-500"></i> Correct</span>
                    <strong class="text-xl font-bold text-slate-800 font-mono"><span id="finalCorrect" class="text-emerald-600">0</span> / 50</strong>
                </div>
            </div>
            
            <button onclick="location.reload()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-xl transform transition-all active:scale-95 flex justify-center items-center gap-2 border border-slate-700">
                <i class="fa-solid fa-rotate-right"></i> Play Again
            </button>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // ⚠️⚠️⚠️ 在这里填入你的 Firebase 钥匙 ⚠️⚠️⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyDZU8J6tnyCe_-amiBvFuwlwpx4fXw-uGM",
            authDomain: "bb-quiz-app.firebaseapp.com",
            projectId: "bb-quiz-app",
            storageBucket: "bb-quiz-app.firebasestorage.app",
            messagingSenderId: "370671276686",
            appId: "1:370671276686:web:204abb8c375f130b3a2fdf",
            measurementId: "G-R83HJ2EDQG"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 游戏变量
        let currentRole = "", playerName = "", questions = [], currentQIndex = 0;
        let score = 0, currentStreak = 0, maxStreak = 0, totalCorrect = 0;

        // 页面切换助手（重新触发动画）
        function switchPage(hideId, showId) {
            document.getElementById(hideId).classList.add("hidden");
            const showEl = document.getElementById(showId);
            showEl.classList.remove("hidden");
            showEl.classList.remove("page-enter"); 
            void showEl.offsetWidth; // 触发重绘，使动画重新执行
            showEl.classList.add("page-enter");
        }

        function selectRole(role) {
            currentRole = role;
            document.getElementById("displayRole").innerText = role;
            switchPage("page1-role", "page2-name");
        }

        function goBack() {
            switchPage("page2-name", "page1-role");
        }

        function startQuiz() {
            let nameInput = document.getElementById("playerName").value.trim();
            if (nameInput === "") {
                alert("Please enter your name!");
                document.getElementById("playerName").focus();
                return;
            }
            playerName = nameInput.toUpperCase(); 

            switchPage("page2-name", "page3-quiz");
            document.getElementById("questionText").innerHTML = '<i class="fa-solid fa-spinner fa-spin text-indigo-500 mr-2"></i> Loading from database...';

            let collectionName = currentRole === "Junior" ? "JuniorQuestions" : "SeniorQuestions";
            
            db.collection(collectionName).get().then((querySnapshot) => {
                questions = [];
                querySnapshot.forEach((doc) => questions.push(doc.data()));
                
                if(questions.length === 0) {
                    document.getElementById("questionText").innerText = "No questions found in database!";
                    return;
                }

                questions.sort(() => Math.random() - 0.5);
                questions = questions.slice(0, 50); 
                
                loadQuestionUI();
            });
        }

        function loadQuestionUI() {
            let q = questions[currentQIndex];
            document.getElementById("progressText").innerHTML = `<i class="fa-solid fa-bars-progress"></i> Question ${currentQIndex + 1} of ${questions.length}`;
            document.getElementById("questionText").innerText = q.question;
            
            for(let i=0; i<4; i++) {
                let btn = document.getElementById("btn" + i);
                document.getElementById("opt" + i).innerText = q.options[i];
                
                // 恢复默认 Tailwind 类，移除 correct/wrong 变色
                btn.className = "option-btn w-full p-4 bg-white border-2 border-slate-200 rounded-xl text-slate-700 font-bold text-left text-[15px] shadow-sm flex items-center gap-3";
                btn.disabled = false;         
            }
            document.getElementById("nextBtn").classList.add("hidden");
        }

        function checkAnswer(selectedIndex) {
            let q = questions[currentQIndex];
            let correctIndex = q.correct_index;

            for(let i=0; i<4; i++) document.getElementById("btn" + i).disabled = true;

            if (selectedIndex === correctIndex) {
                // 答对：加上 correct 类（会触发渐变绿特效）
                document.getElementById("btn" + selectedIndex).classList.add("correct");
                currentStreak++;
                totalCorrect++;
                if (currentStreak > maxStreak) maxStreak = currentStreak;
                score += 10 * Math.pow(2, currentStreak - 1);
            } else {
                // 答错：加上 wrong 类（变红且抖动），正确答案变绿
                document.getElementById("btn" + selectedIndex).classList.add("wrong");
                document.getElementById("btn" + correctIndex).classList.add("correct");
                currentStreak = 0; 
            }

            // 更新状态栏数据
            document.getElementById("scoreDisplay").innerText = score;
            document.getElementById("streakDisplay").innerText = currentStreak;
            document.getElementById("correctDisplay").innerText = `${totalCorrect}/${questions.length}`;
            
            // 显示 Next 按钮
            document.getElementById("nextBtn").classList.remove("hidden");
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < questions.length) {
                loadQuestionUI();
            } else {
                endGame();
            }
        }

        function endGame() {
            switchPage("page3-quiz", "page4-result");

            document.getElementById("finalName").innerText = playerName + " (" + currentRole + ")";
            document.getElementById("finalScore").innerText = score;
            document.getElementById("finalCombo").innerText = maxStreak;
            document.getElementById("finalCorrect").innerText = totalCorrect;
            
            // 上传至排行榜
            let playerDocId = currentRole + "_" + playerName;
            db.collection("Leaderboard").doc(playerDocId).set({
                name: playerName,
                role: currentRole,
                score: score,
                maxCombo: maxStreak,
                correctAnswers: totalCorrect,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                console.log("Score updated to Leaderboard.");
            });
        }
    </script>
</body>
</html>
